<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="descripcion" content="Is a new quiz">
    <meta name="author" content="Carlos">
    <link rel="stylesheet" href="wwr/styles/quiz.css">
    <title>Quiz</title>
</head>
<body>
    
    <form id="quizForm">
        <h1>Super Quiz</h1>
        <label for="q1">1. What does the acronym CSS stand for</label>
        <input type="text" id="q1" name="q1" required><br><br>

        <label for="q2">2. How are id and class attibutes selected in CSS?</label>
        <textarea id="q2" name="q2" rows="4" cols="50" required></textarea><br><br>

        <label for="q3">3. Which of the following is a valid CSS comment?</label>
        <select id="q3" name="q3" required>
            <option value="option1">Option 1</option>
            <option value="option2">Option 2</option>
            <option value="option3">Option 3</option>
        </select><br><br>

        <label for="q4">4. Enter a number:</label>
        <input type="number" id="q4" name="q4" required><br><br>

        
        <button type="submit">Submit Quiz</button>
    </form>
    
</body>
</html>
